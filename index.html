<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El silbido de los pájaros</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: radial-gradient(ellipse at 50% 38%, #2e1a0a 0%, #0e0602 100%);
  display: flex; align-items: center; justify-content: center;
  user-select: none; -webkit-user-select: none;
  touch-action: none;
}

/* ── UI ── */
#ui {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 300;
}

#fs-btn {
  position: absolute; top: 16px; right: 16px;
  pointer-events: all;
  background: rgba(0,0,0,0.55);
  color: rgba(255,255,255,0.82);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 8px;
  padding: 8px 16px;
  cursor: pointer;
  font-size: 13px;
  font-family: system-ui, sans-serif;
  letter-spacing: 0.4px;
  backdrop-filter: blur(6px);
  transition: background .15s;
}
#fs-btn:hover { background: rgba(0,0,0,0.78); }

#indicator {
  position: absolute; bottom: 18px; left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.32);
  font: 12px/1 Georgia, serif;
  letter-spacing: 2.5px;
}

.arrow {
  position: absolute; top: 50%; transform: translateY(-50%);
  pointer-events: all; cursor: pointer;
  color: rgba(255,255,255,0.18);
  font-size: 48px; font-weight: 100; line-height: 1;
  padding: 18px 14px; border-radius: 8px;
  transition: color .2s, background .2s;
}
.arrow:hover { color: rgba(255,255,255,0.55); background: rgba(255,255,255,0.05); }
.arrow.off    { opacity: .1; pointer-events: none; }
#aPrev { left: 8px; }
#aNext { right: 8px; }

/* ── SCENE ── */
.scene { /* wrapper sin efecto */ }

.book {
  position: relative;
  /* perspective aquí, NO en .scene → páginas estáticas quedan en 2D puro */
  perspective: 2800px;
  perspective-origin: 50% 50%;
  /* sin transform-style preserve-3d ni rotateX → render 2D, máxima nitidez */
}

/* Table shadow */
.book::after {
  content: '';
  position: absolute;
  bottom: -22px; left: 5%; right: 5%;
  height: 30px;
  background: radial-gradient(ellipse, rgba(0,0,0,0.9) 0%, transparent 70%);
  filter: blur(10px);
  border-radius: 50%;
  pointer-events: none;
}

/* ── PAGES ── */
.p {
  position: absolute; top: 0; height: 100%; width: 50%;
  background-size: 200% 100%;
  background-repeat: no-repeat;
  background-color: #f5f0e8;
}

#uL, #pL { left:  0; background-position: 0%   0%; border-radius: 3px 0 0 3px; }
#uR, #pR { right: 0; background-position: 100% 0%; border-radius: 0 3px 3px 0; }
#uL, #uR { z-index: 1; }
#pL, #pR { z-index: 3; }

#pL { box-shadow: inset -10px 0 16px rgba(0,0,0,0.08); }
#pR { box-shadow: inset  10px 0 16px rgba(0,0,0,0.06); }

/* Turn shadow overlay on opposite static page */
/* Dos sombras fijas (izq y der), se activa solo una según dirección */
#tShadL, #tShadR {
  position: absolute; top: 0; height: 100%; width: 50%;
  pointer-events: none; z-index: 5;
  opacity: 0;
}
#tShadL {
  left: 0;
  background: linear-gradient(to left, rgba(0,0,0,0.45) 0%, transparent 70%);
}
#tShadR {
  left: 50%;
  background: linear-gradient(to right, rgba(0,0,0,0.45) 0%, transparent 70%);
}

/* ── TURNING PAGE ── */
#pT {
  position: absolute; top: 0; height: 100%; width: 50%;
  transform-style: preserve-3d;
  z-index: 10; display: none;
  will-change: transform;
}

.face {
  position: absolute; inset: 0;
  background-size: 200% 100%;
  background-repeat: no-repeat;
  background-color: #f5f0e8;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
}

.face.bk { transform: rotateY(180deg); }

/* Fold shadow on face (darkens near hinge = near spine) */
.face::after {
  content: ''; position: absolute; inset: 0;
  pointer-events: none; z-index: 1;
}
.face.fr::after { background: linear-gradient(to left,  rgba(0,0,0,0.14) 0%, rgba(0,0,0,0.03) 20%, transparent 50%); }
.face.bk::after { background: linear-gradient(to right, rgba(0,0,0,0.14) 0%, rgba(0,0,0,0.03) 20%, transparent 50%); }

/* Highlight near fold */
.face::before {
  content: ''; position: absolute; inset: 0;
  pointer-events: none; z-index: 1;
}
.face.fr::before { background: linear-gradient(to left,  transparent 75%, rgba(255,255,255,0.18) 92%, rgba(255,255,255,0.04) 100%); }
.face.bk::before { background: linear-gradient(to right, transparent 75%, rgba(255,255,255,0.18) 92%, rgba(255,255,255,0.04) 100%); }

/* ── SPINE (cinta marcadora de tela) ── */
.spine {
  position: absolute; left: 50%; top: 0; bottom: 0;
  width: 6px; transform: translateX(-50%);
  background:
    /* Brillo sedoso central */
    linear-gradient(to right,
      transparent 0%, rgba(255,255,255,0.08) 30%,
      rgba(255,255,255,0.30) 48%, rgba(255,255,255,0.32) 50%,
      rgba(255,255,255,0.30) 52%, rgba(255,255,255,0.08) 70%,
      transparent 100%
    ),
    /* Trama horizontal (tejido) */
    repeating-linear-gradient(
      180deg,
      rgba(0,0,0,0.14) 0px, rgba(0,0,0,0.14) 1px,
      rgba(255,255,255,0.05) 1px, rgba(255,255,255,0.05) 2px,
      transparent 2px, transparent 5px
    ),
    /* Trama vertical sutil */
    repeating-linear-gradient(
      90deg,
      rgba(0,0,0,0.10) 0px, rgba(0,0,0,0.10) 1px,
      transparent 1px, transparent 4px
    ),
    /* Base: vino/burgundy oscuro como cinta de encuadernación */
    linear-gradient(to right,
      #1a0408 0%, #5a0e1a 22%, #7c1424 45%,
      #8a1828 50%, #7c1424 55%, #5a0e1a 78%, #1a0408 100%
    );
  z-index: 22; pointer-events: none;
  box-shadow:
    -3px 0 8px rgba(0,0,0,0.40),
     3px 0 8px rgba(0,0,0,0.40);
}

/* ── BOOK BORDER ── */
.border {
  position: absolute; inset: -5px;
  border: 5px solid #1e1208;
  border-radius: 5px;
  box-shadow:
    0 0 0 1px #5c3d1e,
    inset 0 0 0 1px rgba(255,210,120,0.07),
    4px 4px 18px rgba(0,0,0,0.6),
    -4px 4px 18px rgba(0,0,0,0.5);
  z-index: 23; pointer-events: none;
}

/* Right page edge thickness */
.edge {
  position: absolute; right: -7px; top: 3px;
  height: calc(100% - 6px); width: 7px;
  background: linear-gradient(to right, #d4cfc5, #bab5ab, #aaa59b);
  border-radius: 0 2px 2px 0;
  z-index: 2; pointer-events: none;
}
</style>
</head>
<body>

<div id="ui">
  <button id="fs-btn">⛶ Pantalla completa</button>
  <div id="indicator">1 – 2 / 16</div>
  <div class="arrow" id="aPrev">‹</div>
  <div class="arrow" id="aNext">›</div>
</div>

<div class="scene">
  <div class="book" id="book">
    <div class="edge"></div>
    <!-- Under pages (revealed during turn) -->
    <div class="p" id="uL"></div>
    <div class="p" id="uR"></div>
    <!-- Current spread -->
    <div class="p" id="pL"></div>
    <div class="p" id="pR"></div>
    <!-- Turn shadows (fixed gradients, solo opacity cambia) -->
    <div id="tShadL"></div>
    <div id="tShadR"></div>
    <!-- Turning page -->
    <div id="pT">
      <div class="face fr" id="fFr"></div>
      <div class="face bk" id="fBk"></div>
    </div>
    <div class="spine"></div>
    <div class="border"></div>
  </div>
</div>

<script>
const IMGS = [
  'imagenes/01-01.png','imagenes/01-02.png','imagenes/01-03.png','imagenes/01-04.png',
  'imagenes/01-05.png','imagenes/01-06.png','imagenes/01-07.png','imagenes/01-08.png',
];
const N = IMGS.length;
let spread = 0;

// DOM
const book  = document.getElementById('book');
const pL    = document.getElementById('pL');
const pR    = document.getElementById('pR');
const uL    = document.getElementById('uL');
const uR    = document.getElementById('uR');
const pT    = document.getElementById('pT');
const fFr   = document.getElementById('fFr');
const fBk   = document.getElementById('fBk');
const tShadL = document.getElementById('tShadL');
const tShadR = document.getElementById('tShadR');
const indic = document.getElementById('indicator');
const aPrev = document.getElementById('aPrev');
const aNext = document.getElementById('aNext');

// ── RESIZE ──
function resize() {
  const mw = window.innerWidth  * 0.90;
  const mh = window.innerHeight * 0.86;
  const aspect = 3300 / 2550; // proporción real de las imágenes
  let w = mw, h = w / aspect;
  if (h > mh) { h = mh; w = h * aspect; }
  book.style.width  = w + 'px';
  book.style.height = h + 'px';
}
resize();
window.addEventListener('resize', resize);

// ── BG HELPER ──
function setBg(el, img, side) {
  el.style.backgroundImage    = `url('${img}')`;
  el.style.backgroundSize     = '200% 100%';
  el.style.backgroundPosition = side === 'L' ? '0% 0%' : '100% 0%';
}

// ── RENDER SPREAD ──
function render() {
  const img = IMGS[spread];
  setBg(pL, img, 'L');
  setBg(pR, img, 'R');
  pL.style.display = '';
  pR.style.display = '';
  indic.textContent = `${spread*2+1} – ${spread*2+2}  /  ${N*2}`;
  aPrev.classList.toggle('off', spread === 0);
  aNext.classList.toggle('off', spread === N-1);
}
render();

// ── TURN STATE ──
let turning  = false;
let dragging = false;
let dir      = null; // 'fwd' | 'bwd'
let startX   = 0;
let curAng   = 0;
let rafId    = null;

function cx(e) { return e.touches ? e.touches[0].clientX : e.clientX; }

// ── SETUP TURN ──
function setup(d) {
  dir    = d;
  curAng = 0;
  if (d === 'fwd') {
    setBg(fFr, IMGS[spread],     'R');
    setBg(fBk, IMGS[spread + 1], 'L');
    setBg(uL,  IMGS[spread + 1], 'L');
    setBg(uR,  IMGS[spread + 1], 'R');
    pT.style.left            = '50%';
    pT.style.transformOrigin = '0% 50%';
    pR.style.display         = 'none';
  } else {
    setBg(fFr, IMGS[spread],     'L');
    setBg(fBk, IMGS[spread - 1], 'R');
    setBg(uL,  IMGS[spread - 1], 'L');
    setBg(uR,  IMGS[spread - 1], 'R');
    pT.style.left            = '0%';
    pT.style.transformOrigin = '100% 50%';
    pL.style.display         = 'none';
  }
  pT.style.display = 'block';
  pT.style.transition = 'none';
  tShadL.style.opacity = '0';
  tShadR.style.opacity = '0';
  setAngle(0);
}

// ── APPLY ANGLE ──
function setAngle(a) {
  curAng = a;
  pT.style.transform = `rotateY(${a}deg)`;
  // opacity cambia solo (GPU, sin repaint) — pico en 90° con seno
  const op = (Math.sin((Math.abs(a) / 180) * Math.PI) * 0.32).toFixed(4);
  if (dir === 'fwd') { tShadL.style.opacity = op; tShadR.style.opacity = '0'; }
  else               { tShadR.style.opacity = op; tShadL.style.opacity = '0'; }
}

// ── ANIMATE ──
function animTo(target, ms, done) {
  turning = true;
  const from = curAng;
  const t0   = performance.now();
  cancelAnimationFrame(rafId);
  (function tick(now) {
    const p = Math.min((now - t0) / ms, 1);
    // Ease in-out cubic
    const e = p < 0.5 ? 4*p*p*p : 1 - Math.pow(-2*p+2,3)/2;
    setAngle(from + (target - from) * e);
    if (p < 1) { rafId = requestAnimationFrame(tick); }
    else { turning = false; done(); }
  })(t0);
}

function finish() {
  if (dir === 'fwd') spread++; else spread--;
  render();
  pT.style.display     = 'none';
  tShadL.style.opacity = '0';
  tShadR.style.opacity = '0';
}

function cancel() {
  pL.style.display     = '';
  pR.style.display     = '';
  pT.style.display     = 'none';
  tShadL.style.opacity = '0';
  tShadR.style.opacity = '0';
}

// ── DRAG EVENTS ──
function onDown(e) {
  if (turning || dragging) return;
  const x    = cx(e);
  const rect = book.getBoundingClientRect();
  const half = rect.width / 2;
  const relX = x - rect.left;

  if      (relX > half && spread < N-1) dir = 'fwd';
  else if (relX < half && spread > 0  ) dir = 'bwd';
  else return;

  dragging = true;
  startX   = x;
  setup(dir);
  e.preventDefault();
}

function onMove(e) {
  if (!dragging || turning) return;
  const dx   = cx(e) - startX;
  const half = book.getBoundingClientRect().width / 2;
  const ratio = Math.max(0, Math.min(1, (dir === 'fwd' ? -dx : dx) / half));
  setAngle((dir === 'fwd' ? -1 : 1) * ratio * 180);
  e.preventDefault();
}

function onUp() {
  if (!dragging) return;
  dragging = false;
  if (Math.abs(curAng) >= 62) {
    animTo(dir === 'fwd' ? -180 : 180, 300, finish);
  } else {
    animTo(0, 240, cancel);
  }
}

book.addEventListener('mousedown',  onDown, { passive: false });
book.addEventListener('touchstart', onDown, { passive: false });
window.addEventListener('mousemove',  onMove, { passive: false });
window.addEventListener('touchmove',  onMove, { passive: false });
window.addEventListener('mouseup',   onUp);
window.addEventListener('touchend',  onUp);

// ── ARROW CLICKS ──
aNext.addEventListener('click', () => {
  if (turning || spread >= N-1) return;
  setup('fwd');
  animTo(-180, 440, finish);
});
aPrev.addEventListener('click', () => {
  if (turning || spread <= 0) return;
  setup('bwd');
  animTo(180, 440, finish);
});

// ── KEYBOARD ──
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'PageDown') aNext.click();
  if (e.key === 'ArrowLeft'  || e.key === 'PageUp'  ) aPrev.click();
});

// ── FULLSCREEN ──
const fsBtn = document.getElementById('fs-btn');
fsBtn.addEventListener('click', () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(()=>{});
    fsBtn.textContent = '✕ Salir de pantalla completa';
  } else {
    document.exitFullscreen();
    fsBtn.textContent = '⛶ Pantalla completa';
  }
});
document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement) fsBtn.textContent = '⛶ Pantalla completa';
  resize();
});
</script>
</body>
</html>
